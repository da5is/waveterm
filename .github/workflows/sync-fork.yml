# Sync Fork - Automatically merges upstream changes from wavetermdev/waveterm into this fork.
# Runs daily and can be triggered manually.

name: Sync Fork
run-name: Sync from upstream${{ github.event_name == 'workflow_dispatch' && ' - Manual' || '' }}
on:
    schedule:
        # Run daily at a random-ish time (06:42 UTC) to avoid load spikes
        - cron: "42 6 * * *"
    workflow_dispatch:

jobs:
    sync:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Sync upstream
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git remote add upstream https://github.com/wavetermdev/waveterm.git
                  git fetch upstream main
                  echo "=== Upstream HEAD ==="
                  git log --oneline upstream/main -1
                  echo "=== Fork HEAD ==="
                  git log --oneline origin/main -1
                  if git merge-base --is-ancestor upstream/main HEAD; then
                      echo "Already up to date with upstream."
                  else
                      echo "Merging upstream changes..."
                      git merge upstream/main --no-edit
                      git push origin main
                      echo "Sync complete."
                  fi
